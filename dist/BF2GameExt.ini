[AimAssist]
; Controller aim assist — reimplemented from Xbox SWBF2 UpdateTargetLockedObjTracking.
; Requires [Controller] Enabled=1. Only active when target is locked (Q key / LockTarget).
; Singleplayer / host only. Zones are per-weapon (derived from AutoAimSize ODF property).
Enabled=1
; Fallback cone angle (degrees) — only used when weapon has no AutoAimSize
ConeAngle=30.0
; Directional friction scale (Xbox: 3.0). Only slows stick when pushing AWAY from target.
; Higher = more slowdown. At bubble edge, stick is completely suppressed.
FrictionStrength=3.0
; Auto-tracking ramp rate per second (Xbox: 5.0). When not touching stick, camera
; automatically tracks the locked target. Also provides snap-on-lock feel.
PullStrength=5.0
; Lock break time — seconds of pushing away near bubble edge to deselect target (Xbox: 0.1)
; Set to 0 to disable lock breaking.
LockBreakTime=0.1
; Auto-lock: automatically lock onto enemies you damage with controller
AutoLockOnHit=1

[Hooks]
; Lua hooks / function registration — independent from patches
LuaHooks=1
; AnimTexture lightsaber system — enables AnimTexture1-3 ODF properties for
; animated blade textures (ported from Xbox). Requires LuaHooks=1.
AnimTextures=1
; TransformBone ODF property — enables per-class procedural bone transforms.
; Add TransformBone = "bone_name" to soldier ODFs (MUST come after Animation/SkeletonName).
TransformBone=1

[Debug]
LogLevel=1
