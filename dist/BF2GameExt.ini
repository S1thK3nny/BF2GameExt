[AimAssist]
; Controller aim assist — reimplemented from Xbox SWBF2 UpdateTargetLockedObjTracking.
; Requires [Controller] Enabled=1. Only active when target is locked (Q key / LockTarget).
; Singleplayer / host only. Zones are per-weapon (derived from AutoAimSize ODF property).
Enabled=1
; Fallback cone angle (degrees) — only used when weapon has no AutoAimSize ODF property
ConeAngle=30.0
; Tracking dead zone — multiplier for the weapon's AutoAimSize that sets the area around
; the crosshair where auto-tracking does nothing (Xbox: 0.5). Smaller = tracking kicks in
; sooner and feels more aggressive. Larger = target must be further off-center before
; tracking starts. Range: 0.1 (very aggressive) to 1.0 (very passive).
TrackingDeadZone=0.5
; Directional friction scale (Xbox: 3.0). Only slows the stick when pushing AWAY from
; the target — pushing toward the target always has full speed. Higher = more slowdown
; when pushing away. At the friction zone edge, stick is completely suppressed.
FrictionStrength=3.0
; Auto-tracking ramp rate per second (Xbox: 5.0). Controls how fast the camera drifts
; toward the locked target when the stick is idle. Higher = faster snap-on-lock feel.
PullStrength=5.0
; Lock break time — seconds of pushing away near the friction zone edge to deselect
; the target (Xbox: 0.1). Set to 0 to disable lock breaking entirely.
LockBreakTime=0.1
; Auto-lock: automatically lock onto enemies you damage with controller.
; Only triggers when no target is currently locked — manual button to switch targets.
AutoLockOnHit=1
; Snap strength — instant correction on first frame of new lock (0.0 = Xbox ramp
; only, 1.0 = full instant snap to target). Makes initial lock feel more responsive.
SnapStrength=1.0
; Proximity friction — omnidirectional stick slowdown when crosshair passes near
; ANY enemy (soldiers, vehicles, turrets). Works independently of lock-on.
ProximityFriction=1
; Screen-space radius for proximity friction (NDC units, 0.0-1.0).
; Larger = wider sticky zone. 0.5 covers roughly half the screen width.
ProximityFrictionRadius=0.5
; Friction intensity at dead center of target (0.0 = full stop, 1.0 = no friction).
; Friction fades linearly from this value at center to 1.0 at the radius edge.
ProximityFrictionScale=0.4

[Hooks]
; Lua hooks / function registration — independent from patches
LuaHooks=1
; AnimTexture lightsaber system — enables AnimTexture1-3 ODF properties for
; animated blade textures (ported from Xbox). Requires LuaHooks=1.
AnimTextures=1
; TransformBone ODF property — enables per-class procedural bone transforms.
; Add TransformBone = "bone_name" to soldier ODFs (MUST come after Animation/SkeletonName).
TransformBone=1
; Directional roll — plays diveleft/diveright instead of diveforward when
; rolling while strafing. Requires "[bankname]_diveleft/diveright" animations
; in the soldier's animation bank (walks parent chain for inheritance).
DirectionalRoll=1
; Xbox spawn screen port — replaces the PC combined spawn/class screen with
; the Xbox two-screen flow (character select → spawn point select).
; EXPERIMENTAL — Phase 1: screen flow only, no UI content population yet.
SpawnScreen=0

[Debug]
LogLevel=1
