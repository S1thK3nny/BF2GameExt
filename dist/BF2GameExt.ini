; BF2GameExt.ini — auto-generated by generate_ini.py
; Do not edit manually; update ini_registry.hpp or controller_support.cpp
; and re-run:  python generate_ini.py

[General]
; Master enable/disable switch for BF2GameExt
Enabled=1
; Path to the main extension DLL (relative to proxy)
DLLPath=BF2GameExt.dll

[LimitIncreases]
; Extend RedMemory heap size
HeapExtension=1
; Raise SoundParameterized layer limit
SoundLayerLimit=1
; Raise DLC / addon mission limit
DLCMissionLimit=1
; Raise global sound limit
SoundLimit=1
; Increase particle effect cache
ParticleCacheIncrease=1
; Raise entity / object pool limit
ObjectLimitIncrease=1
; Raise combo animation limit
ComboAnimIncrease=1
; Raise high-resolution animation limit
HighResAnimLimit=1
; Increase network timer count
NetworkTimerIncrease=1
; Extend matrix / item pool size
MatrixPoolIncrease=1

[Fixes]
; Fix chunk push crash
ChunkPushFix=1

[Features]
; Enable prone stance (requires prone animations in soldier banks)
Prone=1

[Controller]
; Enable gamepad / controller support
Enabled=1
; Enable controller rumble / vibration
Rumble=1

; Controller button/axis bindings per mode.
; Keys are raw input names, values are comma-separated action names.
; Omit a key or set it to empty to unbind.  Defaults are shown below.
; See README.md for the full list of input and action names.

