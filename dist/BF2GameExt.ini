[Controller]
; Master enable/disable for gamepad support
Enabled=1
; Force feedback vibration driven by weapon ODF recoil/charge params
Rumble=1
; Global rumble intensity multiplier (0.0 = off, 1.0 = normal, 2.0 = double)
RumbleScale=1.0

; =========================================================================
; Per-mode controller bindings
; =========================================================================
; NOTE: The game supports 2 binding slots per action. Keyboard/mouse uses
; slot 0, and controller bindings use slot 1. This means each action can
; have one keyboard/mouse binding and one controller binding. If you have
; two keyboard bindings set for an action in-game, the alternate (slot 1)
; will be replaced by the controller binding on each level load.
;
; To avoid conflicts: make sure your preferred keyboard binding is in the
; PRIMARY slot (slot 0) in the in-game Controls menu before enabling controller.
;
; Each [Controller.*] section configures a control mode. If a key is
; missing, the built-in default is used. Set a key to "None" to unbind.
;
; Multi-bind: use commas to bind one input to multiple actions.
;   Example: B=Crouch,Roll
;
; Available inputs:
;   Buttons:  A, B, X, Y, LB, RB, Back, Start, L3, R3
;   D-pad:    DPadUp, DPadRight, DPadDown, DPadLeft
;   Triggers: RT, LT
;   Sticks:   LX+, LX-, LY+, LY-, RX+, RX-, RY+, RY-
;   Raw DI:   ZPos, ZNeg, RZPos, RZNeg
;
; Available actions:
;   PrimaryFire, SecondaryFire, Sprint, Jump, Crouch, Zoom, View,
;   Reload, Use, SquadCommand, AcceptHero, DeclineHero, LockTarget,
;   PrimaryNext, PrimaryPrev, SecondaryNext, SecondaryPrev,
;   PlayerList, Map, Roll
;   Axes:      StrafeAxis, MoveAxis, TurnAxis, PitchAxis
;   Half-axes: StrafePos, StrafeNeg, MovePos, MoveNeg,
;              TurnPos, TurnNeg, PitchPos, PitchNeg
;   Unbind:    None
; =========================================================================

